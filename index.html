<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Connect</title>
    <style>
        /* FUTURISTIC CSS */
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050509;
            --glass-bg: rgba(20, 20, 30, 0.85);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050509 100%);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        header {
            text-align: center;
            padding: 15px;
            border-bottom: 1px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            position: sticky;
            top: 0;
            background: rgba(5, 5, 9, 0.95);
            z-index: 100;
        }

        h1 { margin: 0; font-size: 22px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .page { display: none; padding: 15px; gap: 20px; flex-direction: column; animation: fadeIn 0.3s; }
        .active-page { display: flex; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .panel {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
        }

        input, textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--neon-blue);
            color: white;
            padding: 12px;
            margin-top: 10px;
            border-radius: 5px;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:active { background: var(--neon-blue); color: black; }

        /* Posts */
        .post { background: rgba(0, 0, 0, 0.8); border-left: 4px solid var(--neon-blue); padding: 15px; margin-top: 15px; border-radius: 5px; }
        .post-img { max-width: 100%; border-radius: 5px; margin-top: 10px; display: none; }

        /* File Upload */
        .upload-btn {
            background: transparent; border: 1px dashed var(--neon-purple); color: var(--neon-purple); margin-top: 10px; padding: 10px; text-align: center; border-radius: 5px; cursor: pointer; display: block;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 15, 0.95); border-top: 1px solid var(--neon-purple); display: none; justify-content: space-around; padding: 10px 0; z-index: 1000;
        }
        .nav-item { color: #888; text-align: center; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 3px; }

        /* Grid */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .market-category { background: rgba(0,0,0,0.5); border: 1px solid var(--neon-purple); padding: 20px 10px; text-align: center; border-radius: 10px; color: var(--neon-purple); cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>MARKET CONNECT</h1>
    </header>

    <!-- AUTHENTICATION PAGE (LOGIN/REGISTER) -->
    <div id="auth" class="page active-page">
        <div class="panel" style="text-align: center; margin-top: 20px;">
            <h2>SYSTEM LOGIN</h2>
            <p style="color: #888; font-size: 14px;">Register or login to enter the network.</p>
            <input type="text" id="username" placeholder="Create Username...">
            <input type="password" id="password" placeholder="Password...">
            <button onclick="login()">ENTER NEXUS</button>
        </div>
    </div>

    <!-- MAIN FEED -->
    <div id="feed" class="page">
        <div class="panel">
            <h2 style="margin-top: 0; font-size: 18px;">Global Broadcast</h2>
            <textarea id="biz-desc" rows="3" placeholder="What are you promoting today?"></textarea>
            
            <!-- Hidden File Input -->
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="previewImage(event)">
            <!-- Custom Upload Button -->
            <label for="file-input" class="upload-btn">📸 Attach Image/File</label>
            <img id="image-preview" class="post-img" src="">

            <button onclick="postAd('feed-panel')">TRANSMIT</button>
        </div>
        <div class="panel" id="feed-panel">
            <h2 style="margin-top: 0; font-size: 18px;">Timeline</h2>
            <!-- Posts will appear here -->
        </div>
    </div>

    <!-- MARKETPLACE CATEGORIES -->
    <div id="market" class="page">
        <div class="panel">
            <h2 style="margin-top: 0; font-size: 18px;">Select Sector</h2>
            <div class="market-grid">
                <div class="market-category" onclick="openCategory('Tech & Web')">💻 Tech & Web</div>
                <div class="market-category" onclick="openCategory('Fashion')">👕 Fashion</div>
                <div class="market-category" onclick="openCategory('Design')">🎨 Design</div>
                <div class="market-category" onclick="openCategory('Services')">💼 Services</div>
            </div>
        </div>
    </div>

    <!-- SPECIFIC CATEGORY PAGE -->
    <div id="category-view" class="page">
        <div class="panel">
            <button onclick="switchPage('market')" style="margin-top:0; padding: 5px; width: 60px; border-color: #888; color: #888;">← Back</button>
            <h2 id="cat-title" style="color: var(--neon-purple);">Category</h2>
            <textarea id="cat-desc" rows="2" placeholder="Post product in this category..."></textarea>
            <button onclick="postAd('cat-feed-panel', 'cat-desc')">POST PRODUCT</button>
        </div>
        <div class="panel" id="cat-feed-panel">
            <h2 style="margin-top: 0; font-size: 18px;">Category Listings</h2>
        </div>
    </div>

    <!-- MESSAGES -->
    <div id="messages" class="page">
        <div class="panel">
            <h2 style="margin-top: 0; font-size: 18px;">Global Chat Room</h2>
            <div id="chat-box" style="height: 200px; overflow-y: auto; background: #000; padding: 10px; border: 1px solid #333; margin-bottom: 10px;">
                <div style="color: var(--neon-blue);">[System]: Welcome to Global Chat.</div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chat-msg" placeholder="Type a message..." style="margin-top: 0;">
                <button onclick="sendChat()" style="margin-top: 0; width: 80px;">SEND</button>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" id="nav-bar">
        <div class="nav-item active" onclick="switchPage('feed', this)">
            <span class="nav-icon">🌐</span> Feed
        </div>
        <div class="nav-item" onclick="switchPage('market', this)">
            <span class="nav-icon">🏬</span> Market
        </div>
        <div class="nav-item" onclick="switchPage('messages', this)">
            <span class="nav-icon">💬</span> Chat
        </div>
    </nav>

    <!-- JAVASCRIPT -->
    <script>
        let currentUser = "";
        let uploadedImageSrc = "";

        // 1. LOGIN SYSTEM
        function login() {
            let user = document.getElementById('username').value;
            let pass = document.getElementById('password').value;
            
            if(user.length < 3) {
                alert("Username must be at least 3 letters.");
                return;
            }
            
            // Save user temporarily
            currentUser = user;
            
            // Hide Auth, Show Feed and Nav
            document.getElementById('auth').classList.remove('active-page');
            document.getElementById('feed').classList.add('active-page');
            document.getElementById('nav-bar').style.display = 'flex';
        }

        // 2. PAGE NAVIGATION
        function switchPage(pageId, navElement = null) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active-page'));
            document.getElementById(pageId).classList.add('active-page');
            
            if(navElement) {
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                navElement.classList.add('active');
            }
            window.scrollTo(0,0);
        }

        // 3. OPEN SPECIFIC CATEGORY
        function openCategory(catName) {
            document.getElementById('cat-title').innerText = catName + " Products";
            switchPage('category-view');
        }

        // 4. IMAGE UPLOAD PREVIEW
        function previewImage(event) {
            let reader = new FileReader();
            reader.onload = function() {
                let output = document.getElementById('image-preview');
                output.src = reader.result;
                output.style.display = 'block';
                uploadedImageSrc = reader.result; // Save for posting
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        // 5. POSTING LOGIC
        function postAd(targetPanelId, inputId = 'biz-desc') {
            let desc = document.getElementById(inputId).value;

            if (desc === "" && uploadedImageSrc === "") {
                alert("Please write something or attach an image.");
                return;
            }

            let newPost = document.createElement('div');
            newPost.className = 'post';
            
            // Build the post HTML
            let postContent = `<div style="color: var(--neon-purple); font-weight: bold;">@${currentUser}</div><div>${desc}</div>`;
            
            if(uploadedImageSrc !== "") {
                postContent += `<img src="${uploadedImageSrc}" style="max-width: 100%; border-radius: 5px; margin-top: 10px;">`;
            }

            newPost.innerHTML = postContent;

            let panel = document.getElementById(targetPanelId);
            panel.insertBefore(newPost, panel.children[1]); 

            // Clear inputs
            document.getElementById(inputId).value = '';
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('image-preview').src = '';
            uploadedImageSrc = "";
        }

        // 6. CHAT LOGIC
        function sendChat() {
            let msg = document.getElementById('chat-msg').value;
            if(msg === "") return;

            let chatBox = document.getElementById('chat-box');
            chatBox.innerHTML += `<div style="margin-top: 5px;"><span style="color: var(--neon-purple); font-weight:bold;">${currentUser}:</span> ${msg}</div>`;
            
            document.getElementById('chat-msg').value = '';
            chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
        }
    </script>
</body>
    </html>
